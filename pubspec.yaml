name: personal_teck
description: Personal Teck - App para personal trainers e alunos
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  google_fonts: ^8.1.0
  cached_network_image: ^3.3.1
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.3
  youtube_player_iframe: ^5.1.0
  intl: ^0.20.2
  equatable: ^2.0.5
  url_launcher: ^6.3.0
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/